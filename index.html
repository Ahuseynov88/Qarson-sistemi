<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<title>Restoran Sistemi</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --green:#1c6b35;--green-dark:#155327;--red:#a32a24;--red-dark:#84211c;
  --blue:#3498db;--orange:#c4b02e;--orange-dark:#a8972a;--purple:#8e44ad;--yellow:#f1c40f;
  --bg:#f4f5f7;--card:#ffffff;--card2:#eef0f3;--border:#dfe2e7;
  --text:#1a1d24;--text2:#5b6573;--text3:#9aa1ad;
  --overlay-strong:rgba(0,0,0,.55);--overlay-soft:rgba(0,0,0,.08);
  --shadow-color:rgba(0,0,0,.12);
  --brand-gradient:linear-gradient(135deg,#a01942 0%,#5c1030 55%,#280a18 100%);
}
body.dark-mode{
  --green:#2ecc71;--green-dark:#27ae60;--red:#e74c3c;--red-dark:#c0392b;
  --bg:#0f0f1a;--card:#1a1a2e;--card2:#16213e;--border:#2d2d4e;
  --text:#eee;--text2:#aaa;--text3:#666;
  --overlay-strong:rgba(0,0,0,.75);--overlay-soft:rgba(255,255,255,.04);
  --shadow-color:rgba(0,0,0,.4);
}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
.screen{display:none;min-height:100vh;}
.screen.active{display:flex;flex-direction:column;}
#loginScreen{align-items:center;justify-content:center;background:var(--brand-gradient);position:relative;overflow:hidden;}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:380px;text-align:center;margin:auto;}
.login-logo{font-size:48px;margin-bottom:10px;}
.login-box h1{font-size:24px;margin-bottom:6px;}
.login-box p{color:var(--text2);margin-bottom:28px;font-size:14px;}
.role-tabs{display:flex;gap:8px;margin-bottom:24px;background:var(--bg);border-radius:12px;padding:4px;}
.role-tab{flex:1;padding:10px 6px;border:none;background:transparent;color:var(--text2);border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;transition:.2s;}
.role-tab.active{background:var(--card2);color:var(--text);}
.pin-display{display:flex;justify-content:center;gap:12px;margin-bottom:20px;}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);background:transparent;transition:.2s;}
.pin-dot.filled{background:var(--green);border-color:var(--green);}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.num-btn{padding:18px;background:var(--card2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:22px;font-weight:600;cursor:pointer;transition:.15s;}
.num-btn:active{transform:scale(0.93);background:var(--border);}
.login-btn{width:100%;padding:16px;background:var(--green);border:none;border-radius:12px;color:white;font-size:17px;font-weight:700;cursor:pointer;transition:.2s;margin-bottom:10px;}
.login-btn:active{background:var(--green-dark);}
.err-msg{color:var(--red);font-size:13px;min-height:20px;margin-top:10px;}
.topbar{background:var(--brand-gradient);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;position:relative;overflow:hidden;}
.topbar h2,.topbar h1{color:#fff;position:relative;z-index:1;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.btn{padding:9px 18px;border:none;border-radius:9px;cursor:pointer;font-weight:600;font-size:14px;transition:.15s;}
.btn:active{transform:scale(0.96);}
.btn-red{background:var(--red);color:white;}
.btn-green{background:var(--green);color:white;}
.btn-blue{background:var(--blue);color:white;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2);}
.admin-body{flex:1;overflow-y:auto;padding:20px;}
.admin-tabs{display:flex;gap:8px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:16px;flex-wrap:wrap;}
.admin-tab{padding:9px 20px;border:1px solid var(--border);border-radius:9px;background:transparent;color:var(--text2);cursor:pointer;font-weight:600;font-size:14px;transition:.2s;}
.admin-tab.active{background:var(--blue);color:white;border-color:var(--blue);}
.admin-section{display:none;}
.admin-section.active{display:block;}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;text-align:center;}
.stat-num{font-size:32px;font-weight:700;color:var(--green);}
.stat-label{font-size:12px;color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:.05em;}
.grid-2{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.item-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;position:relative;}
.item-card-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.avatar{width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid var(--border);}
.item-info h3{font-size:16px;margin-bottom:3px;}
.item-info small{color:var(--text2);font-size:13px;}
.status-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;}
.badge-green{background:rgba(46,204,113,.15);color:var(--green);}
.badge-red{background:rgba(231,76,60,.15);color:var(--red);}
.item-actions{display:flex;gap:8px;margin-top:14px;}
.item-actions .btn{flex:1;padding:10px;}
.table-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:12px;}
.table-card h3{font-size:16px;margin-bottom:6px;}
.table-card .meta{font-size:13px;color:var(--text2);margin-bottom:14px;}
.log-list{display:flex;flex-direction:column;gap:6px;}
.log-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.log-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px;white-space:nowrap;flex-shrink:0;}
.log-text{font-size:13px;color:var(--text2);flex:1;}
.log-time{font-size:11px;color:var(--text3);white-space:nowrap;}
.modal-bg{display:none;position:fixed;inset:0;background:var(--overlay-strong);z-index:2000;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;font-weight:600;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;outline:none;}
.modal-actions{display:flex;gap:10px;margin-top:20px;}
.modal-actions .btn{flex:1;padding:14px;}
.add-fab{position:fixed;bottom:28px;right:28px;width:60px;height:60px;border-radius:50%;background:var(--green);color:white;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 20px rgba(46,204,113,.4);z-index:100;}
.kitchen-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;padding:20px;}
.k-card{border-radius:18px;padding:20px;text-align:center;border:3px solid transparent;transition:.2s;position:relative;}
.k-card.ready{background:rgba(46,204,113,.1);border-color:var(--green);}
.k-card.called{background:rgba(231,76,60,.15);border-color:var(--red);animation:pulse-border 1s infinite;}
.k-card img{width:88px;height:88px;border-radius:50%;object-fit:cover;margin-bottom:12px;border:3px solid currentColor;}
.k-card h3{font-size:17px;margin-bottom:6px;}
.k-status{font-size:13px;font-weight:600;}
.k-tables-under{display:flex;flex-wrap:wrap;justify-content:center;gap:4px;margin-top:8px;}
.k-table-chip{background:rgba(52,152,219,.2);border:1px solid rgba(52,152,219,.4);border-radius:10px;padding:2px 8px;font-size:11px;color:var(--blue);}
.tables-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:16px;}
.w-table-card{border-radius:12px;padding:14px 8px;border:2px solid var(--border);background:var(--card);cursor:pointer;transition:.2s;text-align:center;min-height:78px;display:flex;flex-direction:column;justify-content:center;}
.w-table-card.mine{background:var(--brand-gradient);border-color:transparent;color:#fff;}
.w-table-card.other{background:rgba(52,152,219,.05);border-color:rgba(52,152,219,.3);cursor:default;opacity:.7;}
.w-table-name{font-size:15px;font-weight:700;margin-bottom:4px;}
.w-table-status{font-size:11px;color:var(--text2);}
.w-table-card.mine .w-table-status{color:#fff;}
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 22px;font-size:14px;font-weight:600;z-index:8000;display:none;white-space:nowrap;box-shadow:0 6px 24px var(--shadow-color);}
#toast.show{display:block;}
@keyframes pulse-border{0%,100%{border-color:var(--red);}50%{border-color:transparent;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="screen active" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">🍽️</div>
    <h1>Restoran Sistemi</h1>
    <p>Rol seçin və PIN daxil edin</p>
    <div class="role-tabs">
      <button class="role-tab active" onclick="setRole('admin',this)">👨‍💼 Admin</button>
      <button class="role-tab" onclick="setRole('staff',this)">👤 Əməkdaş</button>
      <button class="role-tab" onclick="setRole('kitchen',this)">👨‍🍳 Mətbəx</button>
    </div>
    <div class="pin-display" id="pinDots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>
    <div class="numpad">
      <button class="num-btn" onclick="numPress('1')">1</button>
      <button class="num-btn" onclick="numPress('2')">2</button>
      <button class="num-btn" onclick="numPress('3')">3</button>
      <button class="num-btn" onclick="numPress('4')">4</button>
      <button class="num-btn" onclick="numPress('5')">5</button>
      <button class="num-btn" onclick="numPress('6')">6</button>
      <button class="num-btn" onclick="numPress('7')">7</button>
      <button class="num-btn" onclick="numPress('8')">8</button>
      <button class="num-btn" onclick="numPress('9')">9</button>
      <button class="num-btn" onclick="numPress('clear')" style="font-size:14px;color:var(--text2);">SİL</button>
      <button class="num-btn" onclick="numPress('0')">0</button>
      <button class="num-btn" onclick="numPress('back')" style="font-size:20px;">⌫</button>
    </div>
    <button class="login-btn" onclick="doLogin()">Daxil Ol</button>
    <div class="err-msg" id="loginErr"></div>
    <div style="margin-top:10px;font-size:12px;color:var(--text3);">
      Default PIN: Admin=0000 | Qarson=1111 | Mətbəx=9999
    </div>
  </div>
</div>

<!-- ADMIN -->
<div class="screen" id="adminScreen">
  <div class="topbar">
    <h2>👨‍💼 Admin Paneli</h2>
    <div class="topbar-right">
      <button class="btn btn-red" onclick="logout()">Çıxış</button>
    </div>
  </div>
  <div class="admin-body">
    <div class="admin-tabs">
      <button class="admin-tab active" onclick="adminTab('dashboard',this)">📊 İcmal</button>
      <button class="admin-tab" onclick="adminTab('staff',this)">👔 İşçilər</button>
      <button class="admin-tab" onclick="adminTab('tables',this)">🪑 Masalar</button>
      <button class="admin-tab" onclick="adminTab('menu',this)">🍔 Menyu</button>
      <button class="admin-tab" onclick="adminTab('logs',this)">📋 Tarixçə</button>
    </div>
    <div class="admin-section active" id="sec-dashboard">
      <div class="stats-row" id="statsRow"></div>
      <h3 style="color:var(--text2);margin:14px 0;font-size:14px;text-transform:uppercase;">Aktiv Masalar</h3>
      <div class="grid-2" id="activeTables"></div>
    </div>
    <div class="admin-section" id="sec-staff">
      <div class="grid-2" id="staffGrid"></div>
    </div>
    <div class="admin-section" id="sec-tables">
      <div class="grid-2" id="tablesGrid"></div>
    </div>
    <div class="admin-section" id="sec-menu">
      <div class="grid-2" id="menuGrid"></div>
    </div>
    <div class="admin-section" id="sec-logs">
      <div class="log-list" id="logList"></div>
    </div>
  </div>
  <button class="add-fab" onclick="openAddModal()" id="adminFab">+</button>
</div>

<!-- KITCHEN -->
<div class="screen" id="kitchenScreen">
  <div class="topbar">
    <h2>👨‍🍳 Mətbəx Paneli</h2>
    <div class="topbar-right">
      <button class="btn btn-red" onclick="logout()">Çıxış</button>
    </div>
  </div>
  <div class="kitchen-grid" id="kitchenGrid"></div>
</div>

<!-- WAITER -->
<div class="screen" id="waiterScreen">
  <div class="topbar">
    <h2>👤 Qarson Paneli</h2>
    <div class="topbar-right">
      <button class="btn btn-red" onclick="logout()">Çıxış</button>
    </div>
  </div>
  <div class="tables-grid" id="waiterTables"></div>
</div>

<!-- MODALS -->
<div class="modal-bg" id="addModal">
  <div class="modal">
    <h2 id="addModalTitle">Yeni</h2>
    <div id="addModalBody"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeAddModal()">Ləğv</button>
      <button class="btn btn-green" onclick="saveItem()">Saxla</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
// ==================== FIREBASE ====================
const firebaseConfig = {
  apiKey: "AIzaSyAy9ZwLcWpqiXTOg6oKxnaTvvvuIXC_7yA",
  authDomain: "qarsonn-sistemi.firebaseapp.com",
  databaseURL: "https://qarsonn-sistemi-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "qarsonn-sistemi",
  storageBucket: "qarsonn-sistemi.firebasestorage.app",
  messagingSenderId: "1013093073801",
  appId: "1:1013093073801:web:5676a351715cf6161a9758"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const R = {
  staff: db.ref('staff'),
  tables: db.ref('tables'),
  orders: db.ref('orders'),
  logs: db.ref('logs'),
  menuItems: db.ref('menuItems'),
  tableOrders: db.ref('tableOrders'),
  settings: db.ref('settings')
};

// ==================== STATE ====================
let ADMIN_PIN = '0000';
let KITCHEN_PIN = '9999';

let state = {
  role: 'admin',
  pinBuffer: '',
  user: null,
  staff: [],
  tables: [],
  orders: [],
  logs: [],
  menuItems: [],
  tableOrders: {},
  adminSection: 'dashboard'
};

// ==================== UTILS ====================
function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function toArr(obj) {
  if (!obj) return [];
  return Object.keys(obj).map(k => ({ id: k, ...obj[k] }));
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 3000);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ==================== LOGIN ====================
function setRole(r, el) {
  state.role = r;
  document.querySelectorAll('.role-tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  clearPin();
}

function numPress(v) {
  if (v === 'clear') {
    clearPin();
    return;
  }
  if (v === 'back') {
    state.pinBuffer = state.pinBuffer.slice(0, -1);
    updatePinDots();
    return;
  }
  if (state.pinBuffer.length >= 4) return;
  
  state.pinBuffer += v;
  updatePinDots();
  
  if (state.pinBuffer.length === 4) {
    setTimeout(doLogin, 200);
  }
}

function updatePinDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById('d' + i).classList.toggle('filled', i < state.pinBuffer.length);
  }
}

function clearPin() {
  state.pinBuffer = '';
  updatePinDots();
  document.getElementById('loginErr').textContent = '';
}

function doLogin() {
  const pin = state.pinBuffer;
  
  if (state.role === 'admin') {
    if (pin === ADMIN_PIN) {
      state.user = { role: 'admin', name: 'Admin' };
      clearPin();
      showScreen('adminScreen');
      initListeners();
      showToast('✅ Admin daxil oldu');
      return;
    } else {
      showErr('Admin PIN səhvdir! (Default: 0000)');
      clearPin();
      return;
    }
  }
  
  if (state.role === 'kitchen') {
    if (pin === KITCHEN_PIN) {
      state.user = { role: 'kitchen', name: 'Mətbəx' };
      clearPin();
      showScreen('kitchenScreen');
      initListeners();
      showToast('✅ Mətbəx daxil oldu');
      return;
    } else {
      showErr('Mətbəx PIN səhvdir! (Default: 9999)');
      clearPin();
      return;
    }
  }
  
  if (state.role === 'staff') {
    R.staff.once('value', snap => {
      const staffList = toArr(snap.val());
      const worker = staffList.find(s => s.pin === pin);
      
      if (!worker) {
        showErr('PIN tapılmadı!');
        clearPin();
        return;
      }
      
      if (worker.status === 'offline') {
        showErr('Hesab deaktivdir!');
        clearPin();
        return;
      }
      
      state.user = { ...worker, role: 'staff' };
      clearPin();
      showScreen('waiterScreen');
      initListeners();
      showToast('✅ Xoş gəldiniz, ' + worker.name);
    });
  }
}

function showErr(msg) {
  const el = document.getElementById('loginErr');
  el.textContent = msg;
  setTimeout(() => el.textContent = '', 3000);
}

function logout() {
  if (state.user?.role === 'staff') {
    R.staff.child(state.user.id).update({ status: 'ready', lastActive: Date.now() });
  }
  state.user = null;
  removeListeners();
  showScreen('loginScreen');
  showToast('Çıxış edildi');
}

// ==================== LISTENERS ====================
function initListeners() {
  R.staff.on('value', snap => {
    state.staff = toArr(snap.val());
    if (state.user?.role === 'admin') renderAdmin();
    if (state.user?.role === 'kitchen') renderKitchen();
  });
  
  R.tables.on('value', snap => {
    state.tables = toArr(snap.val());
    if (state.user?.role === 'admin') renderAdmin();
    if (state.user?.role === 'staff') renderWaiterTables();
    if (state.user?.role === 'kitchen') renderKitchen();
  });
  
  R.orders.on('value', snap => {
    state.orders = toArr(snap.val());
  });
  
  R.logs.limitToLast(100).on('value', snap => {
    state.logs = toArr(snap.val()).reverse();
    if (state.user?.role === 'admin') renderLogs();
  });
  
  R.menuItems.on('value', snap => {
    state.menuItems = toArr(snap.val());
    if (state.user?.role === 'admin') renderAdmin();
  });
  
  R.settings.child('kitchenPin').on('value', snap => {
    if (snap.val()) KITCHEN_PIN = snap.val();
  });
}

function removeListeners() {
  R.staff.off();
  R.tables.off();
  R.orders.off();
  R.logs.off();
  R.menuItems.off();
  R.settings.child('kitchenPin').off();
}

// ==================== ADMIN ====================
function renderAdmin() {
  if (state.adminSection === 'dashboard') renderDashboard();
  if (state.adminSection === 'staff') renderStaff();
  if (state.adminSection === 'tables') renderTables();
  if (state.adminSection === 'menu') renderMenu();
  if (state.adminSection === 'logs') renderLogs();
}

function adminTab(sec, el) {
  state.adminSection = sec;
  document.querySelectorAll('.admin-tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-' + sec).classList.add('active');
  renderAdmin();
  document.getElementById('adminFab').style.display = (sec === 'tables' || sec === 'menu' || sec === 'staff') ? 'flex' : 'none';
}

function renderDashboard() {
  const activeStaff = state.staff.filter(s => s.status !== 'offline').length;
  const activeTbl = state.tables.filter(t => t.occupant).length;
  const pendingO = state.orders.filter(o => o.status === 'pending').length;
  
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-num">${state.staff.length}</div><div class="stat-label">Cəmi İşçi</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--green)">${activeStaff}</div><div class="stat-label">Aktiv İşçi</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--blue)">${state.tables.length}</div><div class="stat-label">Cəmi Masa</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--orange)">${activeTbl}</div><div class="stat-label">Dolu Masa</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--red)">${pendingO}</div><div class="stat-label">Gözləyən Sifariş</div></div>
  `;
  
  const actTbls = state.tables.filter(t => t.occupant);
  const el = document.getElementById('activeTables');
  if (!actTbls.length) {
    el.innerHTML = '<p style="color:var(--text3);font-size:14px;">Hal-hazırda aktiv masa yoxdur.</p>';
    return;
  }
  el.innerHTML = actTbls.map(t => {
    const w = state.staff.find(x => x.id === t.occupant) || { name: '?' };
    return `<div class="table-card">
      <h3>🪑 ${esc(t.name)}</h3>
      <div class="meta">İşçi: <strong>${esc(w.name)}</strong></div>
      ${t.notes ? `<div style="font-size:13px;color:var(--text2);background:var(--card2);border-radius:8px;padding:8px;margin-bottom:10px;">${esc(t.notes)}</div>` : ''}
    </div>`;
  }).join('');
}

function renderStaff() {
  const el = document.getElementById('staffGrid');
  if (!state.staff.length) {
    el.innerHTML = '<p style="color:var(--text3);">Hələ işçi əlavə edilməyib.</p>';
    return;
  }
  el.innerHTML = state.staff.map(s => {
    const fallback = `https://ui-avatars.com/api/?name=${encodeURIComponent(s.name)}&background=8e44ad&color=fff&size=200`;
    const st = s.status === 'offline' ? 'Deaktiv' : 'Aktiv';
    const bc = s.status === 'offline' ? 'badge-red' : 'badge-green';
    return `<div class="item-card">
      <div class="item-card-header">
        <img class="avatar" src="${s.avatar || fallback}" alt="" onerror="this.src='${fallback}'">
        <div class="item-info">
          <h3>${esc(s.name)}</h3>
          <small style="color:var(--text2);">${esc(s.position || 'İşçi')}</small>
          <small style="color:var(--purple);display:block;font-weight:600;">🔑 ${(s.permissions || []).length} icazə</small>
        </div>
      </div>
      <span class="status-badge ${bc}">${st}</span>
      <div class="item-actions">
        <button class="btn ${s.status === 'offline' ? 'btn-green' : 'btn-red'}" onclick="toggleStaff('${s.id}')">${s.status === 'offline' ? 'Aktiv Et' : 'Deaktiv Et'}</button>
        <button class="btn btn-ghost" onclick="editStaff('${s.id}')">✏️</button>
        <button class="btn btn-red" onclick="deleteStaff('${s.id}')">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

function toggleStaff(id) {
  const s = state.staff.find(x => x.id === id);
  if (!s) return;
  const newStatus = s.status === 'offline' ? 'active' : 'offline';
  R.staff.child(id).update({ status: newStatus });
  showToast(newStatus === 'active' ? `✅ ${s.name} aktiv edildi` : `🚫 ${s.name} deaktiv edildi`);
}

function editStaff(id) {
  const s = state.staff.find(x => x.id === id);
  if (!s) return;
  state.editTarget = { type: 'staff', id };
  document.getElementById('addModalTitle').textContent = '✏️ İşçi Düzəliş';
  document.getElementById('addModalBody').innerHTML = `<div class="form-group"><label>Ad</label><input type="text" id="editName" value="${esc(s.name)}"></div>`;
  document.getElementById('addModal').classList.add('open');
}

function deleteStaff(id) {
  const s = state.staff.find(x => x.id === id);
  if (!confirm(`"${s?.name}" silinsin?`)) return;
  R.staff.child(id).remove();
  showToast('🗑️ İşçi silindi');
}

function renderTables() {
  const el = document.getElementById('tablesGrid');
  if (!state.tables.length) {
    el.innerHTML = '<p style="color:var(--text3);">Hələ masa əlavə edilməyib.</p>';
    return;
  }
  el.innerHTML = state.tables.map(t => {
    const occ = t.occupant ? (state.staff.find(s => s.id === t.occupant) || { name: '?' }).name : 'Boş';
    return `<div class="table-card">
      <h3>🪑 ${esc(t.name)}</h3>
      <div class="meta">${occ !== 'Boş' ? `İşçi: <strong>${esc(occ)}</strong>` : 'Boş'}</div>
      <div class="item-actions">
        <button class="btn btn-ghost" onclick="editTable('${t.id}')">✏️</button>
        <button class="btn btn-blue" onclick="alert('QR: ${t.id}')">📱 QR</button>
        <button class="btn btn-red" onclick="deleteTable('${t.id}')">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

function editTable(id) {
  const t = state.tables.find(x => x.id === id);
  if (!t) return;
  state.editTarget = { type: 'table', id };
  document.getElementById('addModalTitle').textContent = '✏️ Masa';
  document.getElementById('addModalBody').innerHTML = `<div class="form-group"><label>Ad</label><input type="text" id="editTableName" value="${esc(t.name)}"></div>`;
  document.getElementById('addModal').classList.add('open');
}

function deleteTable(id) {
  const t = state.tables.find(x => x.id === id);
  if (t?.occupant) {
    showToast(`❌ "${t.name}" aktivdir! Əvvəlcə bağlayın.`);
    return;
  }
  if (!confirm(`"${t?.name}" silinsin?`)) return;
  R.tables.child(id).remove();
  showToast('🗑️ Masa silindi');
}

function renderMenu() {
  const el = document.getElementById('menuGrid');
  if (!state.menuItems.length) {
    el.innerHTML = '<p style="color:var(--text3);">Hələ mal əlavə edilməyib.</p>';
    return;
  }
  el.innerHTML = state.menuItems.map(m => {
    const fallback = `https://ui-avatars.com/api/?name=${encodeURIComponent(m.name)}&background=f39c12&color=fff&size=200`;
    const available = m.available !== false;
    return `<div class="item-card">
      <div class="item-card-header">
        <img class="avatar" src="${m.photo || fallback}" alt="" onerror="this.src='${fallback}'" style="${!available ? 'opacity:.4;' : ''}">
        <div class="item-info">
          <h3>${esc(m.name)}</h3>
          <small>${esc(m.category || 'Digər')}</small>
          <small style="color:var(--orange);display:block;font-weight:700;">${Number(m.price || 0).toFixed(2)} ₼</small>
        </div>
      </div>
      <span class="status-badge ${available ? 'badge-green' : 'badge-red'}">${available ? 'Var' : 'Tükənib'}</span>
      <div class="item-actions">
        <button class="btn ${available ? 'btn-red' : 'btn-green'}" onclick="toggleMenuItem('${m.id}')">${available ? 'Tükəndi' : 'Yenidən Var'}</button>
        <button class="btn btn-red" onclick="deleteMenuItem('${m.id}')">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

function toggleMenuItem(id) {
  const m = state.menuItems.find(x => x.id === id);
  if (!m) return;
  const newAvailable = !(m.available !== false);
  R.menuItems.child(id).update({ available: newAvailable });
  showToast(newAvailable ? `✅ ${m.name} yenidən mövcuddur` : `🚫 ${m.name} tükəndi`);
}

function deleteMenuItem(id) {
  const m = state.menuItems.find(x => x.id === id);
  if (!confirm(`"${m?.name}" silinsin?`)) return;
  R.menuItems.child(id).remove();
  showToast('🗑️ Mal silindi');
}

function renderLogs() {
  const el = document.getElementById('logList');
  if (!state.logs.length) {
    el.innerHTML = '<p style="color:var(--text3);padding:16px;">Log tapılmadı.</p>';
    return;
  }
  const colors = { login: '#2ecc71', logout: '#95a5a6', order: '#f39c12', table: '#3498db', admin: '#8e44ad', chat: '#e67e22', customer: '#e74c3c' };
  const labels = { login: 'GİRİŞ', logout: 'ÇIXIŞ', order: 'SİFARİŞ', table: 'MASA', admin: 'ADMİN', chat: 'MESAJ', customer: 'MÜŞTƏRİ' };
  el.innerHTML = state.logs.slice(0, 150).map(l => `
    <div class="log-item">
      <span class="log-badge" style="background:${colors[l.type] || '#666'}22;color:${colors[l.type] || '#aaa'}">${labels[l.type] || 'LOG'}</span>
      <span class="log-text">${esc(l.message)}</span>
      <span class="log-time">${l.time || ''} ${l.date || ''}</span>
    </div>
  `).join('');
}

// ==================== KITCHEN ====================
function renderKitchen() {
  const el = document.getElementById('kitchenGrid');
  const activeWaiters = state.staff.filter(s => s.status !== 'offline');
  if (!activeWaiters.length) {
    el.innerHTML = '<p style="color:var(--text2);text-align:center;padding:40px;">Aktiv qarson yoxdur.</p>';
    return;
  }
  el.innerHTML = activeWaiters.map(w => {
    const hasPending = state.orders.some(o => o.waiterId === w.id && o.status === 'pending');
    const myTables = state.tables.filter(t => t.occupant === w.id);
    return `<div class="k-card ${hasPending ? 'called' : 'ready'}">
      ${hasPending ? '<div style="position:absolute;inset:0;border-radius:15px;z-index:10;cursor:not-allowed;"></div>' : ''}
      <img src="${w.avatar || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(w.name) + '&background=2ecc71&color=fff&size=200'}" alt="${esc(w.name)}">
      <h3>${esc(w.name)}</h3>
      <div class="k-status">${hasPending ? '🔴 Gözləyir' : '🟢 Hazır'}</div>
      <div class="k-tables-under">${myTables.map(t => `<span class="k-table-chip">${esc(t.name)}</span>`).join('')}</div>
    </div>`;
  }).join('');
}

// ==================== WAITER ====================
function renderWaiterTables() {
  const el = document.getElementById('waiterTables');
  if (!state.tables.length) {
    el.innerHTML = '<p style="color:var(--text3);">Admin hələ masa əlavə etməyib.</p>';
    return;
  }
  el.innerHTML = state.tables.map(t => {
    const isMine = t.occupant === state.user?.id;
    const isOther = t.occupant && !isMine;
    const otherW = isOther ? (state.staff.find(s => s.id === t.occupant) || { name: '?' }) : null;
    
    let cls = '', statusText = 'Boş', clickAttr = '';
    if (isMine) {
      cls = 'mine';
      statusText = 'Aktiv (mənim)';
      clickAttr = `onclick="alert('${esc(t.name)} - sizin masanız')"`; 
    } else if (isOther) {
      cls = 'other';
      statusText = `${esc(otherW.name)} xidmət edir`;
    } else {
      clickAttr = `onclick="takeTable('${t.id}')"`;
    }
    
    return `<div class="w-table-card ${cls}" ${clickAttr}>
      <div class="w-table-name">${esc(t.name)}</div>
      <div class="w-table-status">${statusText}</div>
    </div>`;
  }).join('');
}

function takeTable(id) {
  R.tables.child(id).update({ occupant: state.user.id });
  showToast('✅ Masa götürüldü');
}

// ==================== MODALS ====================
function openAddModal() {
  state.editTarget = null;
  document.getElementById('addModalTitle').textContent = '➕ Yeni';
  document.getElementById('addModalBody').innerHTML = `
    <div class="form-group"><label>Ad</label><input type="text" id="newName" placeholder="Ad daxil edin"></div>
    <div class="form-group"><label>Kateqoriya</label><input type="text" id="newCategory" placeholder="Kateqoriya"></div>
  `;
  document.getElementById('addModal').classList.add('open');
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('open');
  state.editTarget = null;
}

function saveItem() {
  if (state.editTarget) {
    showToast('✅ Düzəliş saxlanıldı');
  } else {
    showToast('✅ Yeni əlavə edildi');
  }
  closeAddModal();
}

// ==================== INIT ====================
R.tables.once('value', snap => {
  if (!snap.val()) {
    ['Masa 1', 'Masa 2', 'Masa 3', 'VIP Otaq', 'Terras', 'Bar'].forEach(name => {
      R.tables.push({ name, capacity: 4, occupant: null, notes: '', createdAt: Date.now() });
    });
  }
});

R.staff.once('value', snap => {
  if (!snap.val()) {
    [
      { name: 'Əli Məmmədov', firstname: 'Əli', lastname: 'Məmmədov', position: 'Qarson', pin: '1111', avatar: 'https://ui-avatars.com/api/?name=Ali+Mammadov&background=2ecc71&color=fff&size=200', status: 'active', createdAt: Date.now(), permissions: ['table.view', 'table.open', 'order.create'] },
      { name: 'Leyla Həsənli', firstname: 'Leyla', lastname: 'Həsənli', position: 'Qarson', pin: '2222', avatar: 'https://ui-avatars.com/api/?name=Leyla+Hasanli&background=3498db&color=fff&size=200', status: 'active', createdAt: Date.now(), permissions: ['table.view', 'table.open', 'order.create'] },
      { name: 'Orxan Əliyev', firstname: 'Orxan', lastname: 'Əliyev', position: 'Kassir', pin: '3333', avatar: 'https://ui-avatars.com/api/?name=Orxan+Aliyev&background=8e44ad&color=fff&size=200', status: 'offline', createdAt: Date.now(), permissions: ['table.view', 'table.close', 'bill.print'] }
    ].forEach(w => R.staff.push(w));
  }
});

R.settings.child('adminPin').once('value', snap => {
  if (!snap.val()) R.settings.child('adminPin').set('0000');
});

R.settings.child('kitchenPin').once('value', snap => {
  if (!snap.val()) R.settings.child('kitchenPin').set('9999');
});

console.log('✅ Sistem hazır!');
</script>
